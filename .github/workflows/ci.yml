name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Check code formatting
        run: python -m ruff format --check contract_agent tests

      - name: Lint Python sources
        run: python -m ruff check contract_agent tests

      - name: Run unit tests
        run: python -m pytest tests -v

      - name: Compile Python sources
        run: python -m compileall -q contract_agent tests

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build gRPC image
        run: docker build -f contract_agent/agent_rpc/Dockerfile .

name: OpenCodeReview

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: ocr-review-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: OCR review
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_target' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        (
          startsWith(github.event.comment.body, '/open-code-review') ||
          startsWith(github.event.comment.body, '/ocr review')
        )
      )
    env:
      OCR_LLM_URL: ${{ secrets.OCR_LLM_URL }}
      OCR_LLM_AUTH_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
      OCR_LLM_MODEL: ${{ secrets.OCR_LLM_MODEL }}
      OCR_LLM_USE_ANTHROPIC: ${{ secrets.OCR_LLM_USE_ANTHROPIC }}
    steps:
      - name: Check OCR secrets
        id: secrets
        shell: bash
        run: |
          if [ -z "${OCR_LLM_URL}" ] || [ -z "${OCR_LLM_AUTH_TOKEN}" ]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            {
              echo "### OpenCodeReview skipped"
              echo
              echo "Configure repository secrets \`OCR_LLM_URL\` and \`OCR_LLM_AUTH_TOKEN\` to enable OCR reviews."
              echo "Optional secrets: \`OCR_LLM_MODEL\`, \`OCR_LLM_USE_ANTHROPIC\`."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          echo "configured=true" >> "${GITHUB_OUTPUT}"

      - name: Read pull request context
        id: pr
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            let pullRequest;
            if (context.eventName === 'pull_request_target') {
              pullRequest = context.payload.pull_request;
            } else {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });
              pullRequest = data;
            }

            core.setOutput('number', String(pullRequest.number));
            core.setOutput('base_ref', pullRequest.base.ref);
            core.setOutput('head_sha', pullRequest.head.sha);

      - name: Check out base repository
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.base_ref }}

      - name: Fetch pull request commit
        if: steps.secrets.outputs.configured == 'true'
        shell: bash
        run: |
          git fetch --no-tags --prune origin \
            "+refs/heads/${{ steps.pr.outputs.base_ref }}:refs/remotes/origin/${{ steps.pr.outputs.base_ref }}" \
            "+refs/pull/${{ steps.pr.outputs.number }}/head:refs/remotes/origin/pr/${{ steps.pr.outputs.number }}"
          git checkout --detach "${{ steps.pr.outputs.head_sha }}"

      - name: Set up Node.js
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install OpenCodeReview
        if: steps.secrets.outputs.configured == 'true'
        run: npm install -g @alibaba-group/open-code-review

      - name: Configure OpenCodeReview
        if: steps.secrets.outputs.configured == 'true'
        shell: bash
        run: |
          ocr config set llm.url "${OCR_LLM_URL}"
          ocr config set llm.auth_token "${OCR_LLM_AUTH_TOKEN}"
          if [ -n "${OCR_LLM_MODEL}" ]; then
            ocr config set llm.model "${OCR_LLM_MODEL}"
          fi
          if [ -n "${OCR_LLM_USE_ANTHROPIC}" ]; then
            ocr config set llm.use_anthropic "${OCR_LLM_USE_ANTHROPIC}"
          fi

      - name: Run OpenCodeReview
        id: ocr
        if: steps.secrets.outputs.configured == 'true'
        shell: bash
        run: |
          set +e
          ocr review \
            --from "origin/${{ steps.pr.outputs.base_ref }}" \
            --to "${{ steps.pr.outputs.head_sha }}" \
            --format json \
            > /tmp/ocr-result.json \
            2> /tmp/ocr-stderr.log
          status=$?
          set -e

          echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"
          echo "OpenCodeReview exit code: ${status}"
          cat /tmp/ocr-stderr.log || true
          cat /tmp/ocr-result.json || true

      - name: Publish review result
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            const headSha = '${{ steps.pr.outputs.head_sha }}';
            const exitCode = Number('${{ steps.ocr.outputs.exit_code }}');

            const resultPath = '/tmp/ocr-result.json';
            const stderrPath = '/tmp/ocr-stderr.log';
            const stderr = fs.existsSync(stderrPath) ? fs.readFileSync(stderrPath, 'utf8').trim() : '';

            let result = null;
            try {
              const raw = fs.existsSync(resultPath) ? fs.readFileSync(resultPath, 'utf8').trim() : '';
              result = raw ? JSON.parse(raw) : null;
            } catch (error) {
              const body = [
                '### OpenCodeReview failed to parse JSON output',
                '',
                `Exit code: \`${exitCode}\``,
                stderr ? fencedBlock(stderr) : 'No stderr output was captured.'
              ].join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
              core.setFailed(`OpenCodeReview JSON output could not be parsed: ${error.message}`);
              return;
            }

            const comments = Array.isArray(result?.comments) ? result.comments : [];
            const warnings = Array.isArray(result?.warnings) ? result.warnings : [];

            if (comments.length === 0) {
              const message = result?.message || 'No review comments were generated.';
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `### OpenCodeReview\n\n${message}`
              });
              if (exitCode !== 0) {
                core.setFailed(`OpenCodeReview exited with code ${exitCode}.`);
              }
              return;
            }

            const inlineComments = [];
            const summaryComments = [];
            for (const comment of comments) {
              const body = formatComment(comment);
              const line = Number(comment.end_line || comment.start_line || 0);
              if (comment.path && line > 0) {
                inlineComments.push({
                  path: comment.path,
                  line,
                  side: 'RIGHT',
                  body
                });
              } else {
                summaryComments.push({ comment, body });
              }
            }

            let reviewBody = `OpenCodeReview found ${comments.length} issue(s).`;
            if (warnings.length > 0) {
              reviewBody += `\n\nWarnings: ${warnings.length}`;
            }
            if (summaryComments.length > 0) {
              reviewBody += '\n\n' + summaryComments.map(({ comment, body }) => formatSummaryComment(comment, body)).join('\n\n---\n\n');
            }

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                commit_id: headSha,
                event: 'COMMENT',
                body: reviewBody,
                comments: inlineComments
              });
            } catch (error) {
              const fallbackBody = [
                reviewBody,
                '',
                'Inline review comments could not be posted as a batch:',
                fencedBlock(error.message),
                '',
                '### Full OpenCodeReview comments',
                comments.map((comment) => formatSummaryComment(comment, formatComment(comment))).join('\n\n---\n\n')
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: fallbackBody
              });
            }

            if (exitCode !== 0) {
              core.setFailed(`OpenCodeReview exited with code ${exitCode}.`);
            }

            function formatComment(comment) {
              let body = comment.content || comment.message || '';
              if (comment.suggestion_code) {
                body += `\n\nSuggested change:\n${fencedBlock(comment.suggestion_code, 'suggestion')}`;
              }
              return body.trim() || 'OpenCodeReview generated a comment without content.';
            }

            function formatSummaryComment(comment, body) {
              const location = comment.path ? `\`${comment.path}\`` : 'General';
              const start = Number(comment.start_line || 0);
              const end = Number(comment.end_line || 0);
              const lineInfo = start && end && start !== end ? ` lines ${start}-${end}` : (end || start ? ` line ${end || start}` : '');
              return `#### ${location}${lineInfo}\n\n${body}`;
            }

            function fencedBlock(content, language = '') {
              const text = String(content || '');
              const ticks = text.match(/`+/g) || [];
              const maxTicks = ticks.reduce((max, item) => Math.max(max, item.length), 0);
              const fence = '`'.repeat(Math.max(3, maxTicks + 1));
              return `${fence}${language}\n${text}${text.endsWith('\n') ? '' : '\n'}${fence}`;
            }
